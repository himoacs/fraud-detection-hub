apiVersion: v1
kind: ConfigMap
metadata:
  name: fraud-detection-config
  namespace: fraud-detection
data:
  SOLACE_HOST: "ws://solace-pubsubplus:8008"
  SOLACE_VPN: "default"
  LITELLM_MODEL: "gpt-4o-mini"
  ALERT_THRESHOLD: "70"
  METRICS_INTERVAL_SECONDS: "1"
---
apiVersion: v1
kind: Secret
metadata:
  name: fraud-detection-secrets
  namespace: fraud-detection
type: Opaque
stringData:
  SOLACE_USERNAME: "demo"
  SOLACE_PASSWORD: "demo"
  LITELLM_API_KEY: ""  # Set this with your actual API key
